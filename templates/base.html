<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Gastos</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'BCO.cf4df18a-fc9e-4bd2-a638-92abba088080.png' %}?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f1f5f9; 
            --primary: #4f46e5; 
            --primary-hover: #4338ca;
            --secondary: #0ea5e9;
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --border: rgba(226, 232, 240, 0.8);
            --card-bg: rgba(255, 255, 255, 0.85);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 50px 20px; 
        }
        .btn { 
            padding: 12px 24px; 
            border-radius: 12px; 
            font-weight: 700; 
            text-decoration: none; 
            cursor: pointer; 
            border: none; 
            display: inline-block; 
            text-align: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-blue { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }
        .btn-blue:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.23);
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: var(--glass-shadow);
        }
        .form-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        .form-color {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
    {% block extra_css %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    {% block content %}
    {% endblock %}

    <footer style="margin-top: 50px; padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; border-top: 1px solid var(--border);">
        <p style="margin: 0; opacity: 0.8;">&copy; 2026 Tracker de gastos. Proyecto Lenguaje de Programación 2.</p>
    </footer>

    <script>
    const passwordInput = document.querySelector('input[type="password"]');
    const toggle = document.getElementById("togglePassword");

    toggle.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
    });
</script>

    {% block extra_js %}{% endblock %}
</body>
</html>
