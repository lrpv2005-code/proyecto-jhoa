{% extends "base.html" %}

{% block content %}
<div class="container">
    <div style="margin-bottom: 30px;">
        <a href="{% url 'home' %}" style="color: var(--text-muted); text-decoration: none; font-weight: 500;">&larr; Volver al inicio</a>
    </div>

    <div style="background: white; padding: 40px; border-radius: 20px; border: 1px solid var(--border); max-width: 500px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2 style="margin-top: 0; font-weight: 800; text-align: center; margin-bottom: 30px; font-size: 28px;">Añadir Ingreso</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.descripcion.errors }}
            {{ form.descripcion }}
            
            {{ form.monto.errors }}
            {{ form.monto }}
            
            {{ form.fuente.errors }}
            {{ form.fuente }}

            <button type="submit" class="btn btn-blue" style="width: 100%; margin-top: 20px; font-size: 16px;">Guardar Ingreso</button>
        </form>
    </div>
</div>
{% endblock %}
