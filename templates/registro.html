{% extends "base.html" %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg, var(--bg) 0%, #e2e8f0 100%); padding: 40px 0;">
    <div class="glass-card" style="padding:40px;width:400px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <svg width="48" height="48" fill="none" stroke="var(--primary)" viewBox="0 0 24 24" style="margin: 0 auto;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        </div>
        <h2 style="font-weight:800;text-align:center;margin-bottom:25px;font-size:28px;">Crear Cuenta</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 15px; text-align: left;">
                    {{ field.label_tag }}
                    {{ field.errors }}
                    <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" required class="form-input" style="margin-bottom:0; margin-top:5px;">
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-blue" style="width:100%;margin-top:20px;font-size:16px;">Registrarse</button>
        </form>
        <a href="{% url 'login' %}" style="display:block;text-align:center;margin-top:20px;color:var(--text-muted);font-size:14px;text-decoration:none;font-weight:600;">&larr; Volver al login</a>
    </div>
</div>
{% endblock %}
